<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Card — Meridian Trust</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,450;0,9..144,600;1,9..144,450&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/card.css">
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-lines"></div>

<header>
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 24 24" fill="none">
      <path d="M3 9L12 3L21 9V10H3V9Z" stroke="#C9A56E" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M5 10V19M9.5 10V19M14.5 10V19M19 10V19" stroke="#C9A56E" stroke-width="1.4"/>
      <path d="M3 20H21" stroke="#C9A56E" stroke-width="1.4"/>
    </svg>
    Meridian Trust
  </div>
  <span class="nav-tag">Visa Debit</span>
</header>

<main>
  <div class="card-stage">
    <div class="eyebrow">Your card</div>

    <div class="debit-card">
      <div class="card-lines"></div>

      <div class="card-chip">
        <svg width="34" height="28" viewBox="0 0 34 28" fill="none">
          <rect x="0.5" y="0.5" width="33" height="27" rx="4" fill="rgba(201,165,110,0.12)" stroke="rgba(201,165,110,0.45)"/>
          <line x1="11" y1="0.5" x2="11" y2="27.5" stroke="rgba(201,165,110,0.4)"/>
          <line x1="23" y1="0.5" x2="23" y2="27.5" stroke="rgba(201,165,110,0.4)"/>
          <line x1="0.5" y1="9" x2="33.5" y2="9" stroke="rgba(201,165,110,0.4)"/>
          <line x1="0.5" y1="19" x2="33.5" y2="19" stroke="rgba(201,165,110,0.4)"/>
        </svg>
      </div>

      <div class="card-nfc">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C12 2 20 6.5 20 12C20 17.5 12 22 12 22" stroke="rgba(237,230,214,0.5)" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M12 6C12 6 17 8.8 17 12C17 15.2 12 18 12 18" stroke="rgba(237,230,214,0.4)" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M12 10C12 10 14 11 14 12C14 13 12 14 12 14" stroke="rgba(237,230,214,0.35)" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="card-brand-name">Meridian Trust</div>
      <div class="card-last4">4471</div>

      <div class="card-footer">
        <div class="card-holder">Jane Doe</div>
        <div class="card-expiry">
          <span class="card-expiry-label">Valid thru</span>
          <span class="card-expiry-val">09/29</span>
        </div>
      </div>
    </div>

    <div class="card-meta">
      <span><span class="dot"></span>Active</span>
      <span>Everyday Checking ••4471</span>
      <span>Visa Debit</span>
    </div>
  </div>
</main>

</body>
</html>
