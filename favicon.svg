  <line x1="13" y1="13" x2="13" y2="24" stroke="#C9A56E" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="13" x2="19" y2="24" stroke="#C9A56E" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="13" x2="24" y2="24" stroke="#C9A56E" stroke-width="2" stroke-linecap="round"/>

